<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=1920, user-scalable=no" />
    <title>Flixor Tizen</title>
    <!-- Tizen WebAPI (injected at runtime on device, ignored by Vite) -->
    <script>
      // Load Tizen WebAPIs only when running on a Tizen device
      if (typeof tizen !== 'undefined' || navigator.userAgent.indexOf('Tizen') !== -1) {
        var s = document.createElement('script');
        s.src = '$WEBAPIS/webapis/webapis.js';
        document.head.appendChild(s);
      }
    </script>
  </head>
  <body style="background: #050505; color: white; margin: 0; overflow: hidden">
    <div id="root">
      <h1>FLIXOR LOADING...</h1>
    </div>
    <div
      id="debug-overlay"
      style="
        position: fixed;
        top: 0;
        left: 0;
        color: white;
        background: rgba(255, 0, 0, 0.5);
        z-index: 9999;
        display: none;
        padding: 10px;
        font-family: monospace;
      "
    ></div>
    <script>
      (function () {
        function show(text) {
          var el = document.getElementById("debug-overlay");
          if (!el) return;
          el.style.display = "block";
          el.innerHTML += "<p>" + text + "</p>";
        }
        // Runtime errors.
        window.onerror = function (msg, url, line, col) {
          show("Error: " + msg + "<br>@ " + (url || "") + ":" + line + ":" + col);
          return false;
        };
        // Resource load failures (script/link/img) do NOT fire window.onerror;
        // catch them in the capture phase. This is what surfaces a blocked or
        // missing bundle on a TV where the inspector is unavailable.
        window.addEventListener("error", function (e) {
          var t = e.target || e.srcElement;
          if (t && (t.src || t.href)) show("Load failed: " + (t.src || t.href));
        }, true);
        // Unhandled promise rejections (e.g. a hung init).
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          show("Unhandled rejection: " + (r && (r.stack || r.message) ? (r.stack || r.message) : r));
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
