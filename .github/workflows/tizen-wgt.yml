name: Build Tizen WGT

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/tizen/**'
      - 'packages/core/**'
      - '.github/workflows/tizen-wgt.yml'

permissions:
  contents: write

env:
  TIZEN_STUDIO_VER: "5.5"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install expect
        run: sudo apt-get update && sudo apt-get install -y expect

      # Cache the whole Tizen Studio install AND the generated keystore/profile
      # under $HOME (outside the workspace, so actions/checkout's clean doesn't
      # wipe it). Cache hit ⇒ skip the ~minutes-long download/install and reuse
      # the SAME author certificate, so app updates install over previous
      # builds instead of being rejected as a different author. Bump the -vN
      # suffix to force a rebuild of the cache.
      - name: Cache Tizen Studio + signing cert
        id: cache-tizen
        uses: actions/cache@v4
        with:
          path: |
            ~/tizen-studio
            ~/tizen-studio-data
          key: tizen-studio-${{ env.TIZEN_STUDIO_VER }}-flixor-cert-v1

      - name: Download & install Tizen Studio CLI
        if: steps.cache-tizen.outputs.cache-hit != 'true'
        run: |
          curl -o tizen-installer \
            "https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VER}/web-cli_Tizen_Studio_${TIZEN_STUDIO_VER}_ubuntu-64.bin"
          chmod +x tizen-installer
          ./tizen-installer --accept-license "$HOME/tizen-studio"
          rm tizen-installer

      # Generate the author cert ONCE (only when the cached .p12 is absent) so
      # the signing identity stays stable across builds. Then RE-REGISTER the
      # profile and bake its passwords EVERY build — the cached profiles.xml /
      # CLI registry isn't reliably reusable on its own (a cache-hit build that
      # skipped this couldn't find the "Flixor" profile and packaging failed).
      - name: Set up signing certificate + profile
        run: |
          TIZEN="$HOME/tizen-studio/tools/ide/bin/tizen"
          P12="$HOME/tizen-studio-data/keystore/author/flixor.p12"
          PXML="$HOME/tizen-studio-data/profile/profiles.xml"
          DIST="$HOME/tizen-studio-data/tools/certificate-generator/certificates/distributor/tizen-distributor-signer.pwd"

          # Create the author cert only if we don't already have one cached.
          if [ ! -f "$P12" ]; then
            "$TIZEN" certificate -a Flixor -p 1234 -c US -s California -ct SanFrancisco \
              -o Flixor -n Flixor -e flixor@example.org -f flixor
          fi

          # (Re)register the profile against the cert every run — idempotent.
          "$TIZEN" security-profiles remove -n Flixor 2>/dev/null || true
          "$TIZEN" security-profiles add -n Flixor -a "$P12" -p 1234
          "$TIZEN" cli-config "profiles.path=$PXML"

          # Bake the passwords into profiles.xml for non-interactive signing.
          sed -i "s|$HOME/tizen-studio-data/keystore/author/flixor.pwd|1234|g" "$PXML"
          sed -i "s|$DIST|tizenpkcs12passfordsigner|g" "$PXML"
          sed -i 's|password=""|password="tizenpkcs12passfordsigner"|g' "$PXML"

      # --- Flixor web bundle (vite emits config.xml + icon at apps/tizen/dist root) ---
      - name: Install deps
        run: npm ci

      - name: Build @flixor/core
        run: npm run build:core

      - name: Build Tizen web bundle
        run: npm run build -w flixor-tizen

      # --- Sign + package (non-interactive, via expect — same as jellyfin-avplay) ---
      - name: Create expect script
        run: |
          cat > package.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 300
          spawn $env(HOME)/tizen-studio/tools/ide/bin/tizen package -t wgt -s Flixor -- $env(GITHUB_WORKSPACE)/apps/tizen/dist
          expect {
            "Author password:" { send "1234\r"; exp_continue }
            "Save author password" { send "n\r"; exp_continue }
            "Distributor1 password:" { send "tizenpkcs12passfordsigner\r"; exp_continue }
            "Save distributor1 password" { send "n\r"; exp_continue }
            eof
          }
          EOF
          chmod +x package.exp

      - name: Package WGT
        run: |
          ./package.exp
          mkdir -p release
          mv apps/tizen/dist/Flixor.wgt release/Flixor.wgt

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./apps/tizen/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date_tag=$(date +'%Y-%m-%d-%H%M')" >> "$GITHUB_OUTPUT"
          echo "date_pretty=$(date +'%Y-%m-%d %H:%M')" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flixor-wgt
          path: release/*.wgt
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date_tag }}'
          name: 'Flixor Tizen v${{ steps.version.outputs.version }} - ${{ steps.version.outputs.date_pretty }}'
          files: release/*.wgt
          body: |
            # Flixor for Samsung Tizen TV

            Built on ${{ steps.version.outputs.date_pretty }} from `apps/tizen`.

            ## Installation
            1. Enable Developer Mode on your Samsung TV
            2. Sideload either `.wgt` via [Jellyfin2Samsung](https://github.com/Jellyfin2Samsung/Samsung-Jellyfin-Installer/releases/latest), Tizen Studio or `sdb`.

            Signed with a cached, stable Tizen author certificate — updates install over previous builds (developer-mode install).
          draft: false
          # Mark pre-1.0 / beta / rc builds as GitHub pre-releases automatically.
          prerelease: ${{ contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'alpha') }}
